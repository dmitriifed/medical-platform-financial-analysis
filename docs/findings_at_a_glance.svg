<svg width="100%" viewBox="0 0 680 590" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Key findings at a glance</title>
<desc>Six key findings from the medical consultation platform analysis, each paired with its business implication.</desc>
<rect x="0.5" y="0.5" width="679" height="589" rx="12" fill="#ffffff" stroke="#e6e8eb" stroke-width="1"/>
<g font-family="Arial, Helvetica, sans-serif">
<text x="24" y="40" font-size="22" font-weight="700" fill="#1f2d3d">Key findings at a glance</text>
<text x="24" y="62" font-size="13" font-weight="400" fill="#8593a0">Medical consultation platform — what the data shows, and what to do about it</text>
<line x1="24" y1="76" x2="656" y2="76" stroke="#eef1f4" stroke-width="1"/>

<rect x="24" y="92" width="4" height="58" rx="2" fill="#E08A1E"/>
<circle cx="56" cy="121" r="16" fill="#FBEFD9" stroke="#E08A1E" stroke-width="1"/>
<text x="56" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#B26C0C">1</text>
<text x="86" y="116" font-size="15" font-weight="600" fill="#1f2d3d">Revenue grows, but gross margin is shrinking</text>
<text x="86" y="138" font-size="13" font-weight="400" fill="#6b7785">Growth is volume-driven — fix unit economics before scaling further</text>
<text x="656" y="116" text-anchor="end" font-size="11" font-weight="600" fill="#E08A1E">Margin</text>
<line x1="24" y1="166" x2="656" y2="166" stroke="#eef1f4" stroke-width="1"/>

<rect x="24" y="176" width="4" height="58" rx="2" fill="#27AE60"/>
<circle cx="56" cy="205" r="16" fill="#E6F6EE" stroke="#27AE60" stroke-width="1"/>
<text x="56" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#1E8B4E">2</text>
<text x="86" y="200" font-size="15" font-weight="600" fill="#1f2d3d">Video consultations out-earn chat</text>
<text x="86" y="222" font-size="13" font-weight="400" fill="#6b7785">Higher profit per consultation — shift the service mix toward video</text>
<text x="656" y="200" text-anchor="end" font-size="11" font-weight="600" fill="#1E8B4E">Service mix</text>
<line x1="24" y1="250" x2="656" y2="250" stroke="#eef1f4" stroke-width="1"/>

<rect x="24" y="260" width="4" height="58" rx="2" fill="#C0392B"/>
<circle cx="56" cy="289" r="16" fill="#FBE9E7" stroke="#C0392B" stroke-width="1"/>
<text x="56" y="294" text-anchor="middle" font-size="15" font-weight="700" fill="#A83225">3</text>
<text x="86" y="284" font-size="15" font-weight="600" fill="#1f2d3d">Cancellations are rising over time</text>
<text x="86" y="306" font-size="13" font-weight="400" fill="#6b7785">A growing, recoverable revenue leak — add reminders and sync availability</text>
<text x="656" y="284" text-anchor="end" font-size="11" font-weight="600" fill="#C0392B">Operations</text>
<line x1="24" y1="334" x2="656" y2="334" stroke="#eef1f4" stroke-width="1"/>

<rect x="24" y="344" width="4" height="58" rx="2" fill="#E08A1E"/>
<circle cx="56" cy="373" r="16" fill="#FBEFD9" stroke="#E08A1E" stroke-width="1"/>
<text x="56" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#B26C0C">4</text>
<text x="86" y="368" font-size="15" font-weight="600" fill="#1f2d3d">A small group of doctors drives most revenue</text>
<text x="86" y="390" font-size="13" font-weight="400" fill="#6b7785">Concentration risk — broaden and activate the provider base</text>
<text x="656" y="368" text-anchor="end" font-size="11" font-weight="600" fill="#E08A1E">Concentration</text>
<line x1="24" y1="418" x2="656" y2="418" stroke="#eef1f4" stroke-width="1"/>

<rect x="24" y="428" width="4" height="58" rx="2" fill="#C0392B"/>
<circle cx="56" cy="457" r="16" fill="#FBE9E7" stroke="#C0392B" stroke-width="1"/>
<text x="56" y="462" text-anchor="middle" font-size="15" font-weight="700" fill="#A83225">5</text>
<text x="86" y="452" font-size="15" font-weight="600" fill="#1f2d3d">Patients rarely return after the first visit</text>
<text x="86" y="474" font-size="13" font-weight="400" fill="#6b7785">Lifetime value is capped — retention is the biggest untapped lever</text>
<text x="656" y="452" text-anchor="end" font-size="11" font-weight="600" fill="#C0392B">Retention</text>
<line x1="24" y1="502" x2="656" y2="502" stroke="#eef1f4" stroke-width="1"/>

<rect x="24" y="512" width="4" height="58" rx="2" fill="#27AE60"/>
<circle cx="56" cy="541" r="16" fill="#E6F6EE" stroke="#27AE60" stroke-width="1"/>
<text x="56" y="546" text-anchor="middle" font-size="15" font-weight="700" fill="#1E8B4E">6</text>
<text x="86" y="536" font-size="15" font-weight="600" fill="#1f2d3d">Four specialties generate most gross profit</text>
<text x="86" y="558" font-size="13" font-weight="400" fill="#6b7785">Endocrinology, general medicine, surgery, cardiology — scale supply here</text>
<text x="656" y="536" text-anchor="end" font-size="11" font-weight="600" fill="#1E8B4E">Growth focus</text>
</g>
</svg>
